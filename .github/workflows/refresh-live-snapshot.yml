name: Refresh live snapshot

on:
  schedule:
    - cron: '0 12 * * 1-5'
      timezone: 'Asia/Seoul'
    - cron: '40 15 * * 1-5'
      timezone: 'Asia/Seoul'
    - cron: '10 16 * * 1-5'
      timezone: 'America/New_York'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-live-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requests
        run: python -m pip install --upgrade pip requests

      - name: Refresh snapshot
        run: python update_live_snapshot.py

      - name: Commit snapshot
        run: |
          if git diff --quiet -- data/live-market-data.json; then
            echo "No snapshot changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live-market-data.json
          git commit -m "chore: refresh live snapshot"
          git push origin HEAD:main
