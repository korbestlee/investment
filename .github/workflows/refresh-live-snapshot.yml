name: Refresh live snapshot

on:
  schedule:
    - cron: '0 12 * * 1-5'
      timezone: 'Asia/Seoul'
    - cron: '40 15 * * 1-5'
      timezone: 'Asia/Seoul'
    - cron: '10 16 * * 1-5'
      timezone: 'America/New_York'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-live-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requests
        run: python -m pip install --upgrade pip requests

      - name: Refresh snapshot
        id: refresh_snapshot
        continue-on-error: true
        run: python update_live_snapshot.py

      - name: Write workflow status
        if: always()
        env:
          REFRESH_OUTCOME: ${{ steps.refresh_snapshot.outcome }}
        run: python update_workflow_status.py

      - name: Commit generated files
        if: always()
        run: |
          if git diff --quiet -- data/live-market-data.json data/workflow-status.json; then
            echo "No generated file changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live-market-data.json data/workflow-status.json
          git commit -m "chore: refresh live market files"
          git push origin HEAD:main

      - name: Fail workflow when snapshot refresh fails
        if: steps.refresh_snapshot.outcome != 'success'
        run: exit 1
